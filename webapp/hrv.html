<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>HRV Анализ</title>
<style>
  :root{
    --bg:#0a0e1a; --card:#141b2c; --card2:#101728; --line:#222a40;
    --txt:#eef2fb; --muted:#8b94ad;
    --ok:#00d4aa; --good:#a8e063; --watch:#ffd93d; --low:#ff8c42; --crit:#ff4757;
    --teal:#4ecdc4;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,'Segoe UI',Roboto,Inter,sans-serif;background:#05070d;color:var(--txt)}
  .app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);
       display:flex;flex-direction:column;position:relative;overflow:hidden}
  .top{display:flex;align-items:center;gap:12px;padding:16px 16px 8px}
  .top .bk{font-size:20px;color:var(--muted)}
  .top .av{width:26px;height:26px;border-radius:50%;background:#229ed9;display:flex;align-items:center;justify-content:center;font-size:14px}
  .top .ti{font-weight:600}.top .ti small{display:block;color:var(--muted);font-weight:400;font-size:11px}
  .top .mn{margin-left:auto;color:var(--muted)}
  .scroll{flex:1;overflow-y:auto;padding:8px 16px 88px}
  .card{background:var(--card);border-radius:18px;padding:18px;margin-bottom:12px}
  .center{text-align:center}
  .h2{font-size:15px;color:var(--muted);margin:0 0 4px}
  .score{font-size:58px;font-weight:800;line-height:1;letter-spacing:-1px}
  .score small{font-size:22px;color:var(--muted);font-weight:600}
  .state{font-size:18px;font-weight:600;margin-top:6px}
  .legend{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:var(--muted)}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px}
  .upd{color:var(--muted);font-size:12px;margin-top:12px}
  .ttl{font-size:13px;font-weight:600;color:var(--muted);margin:2px 2px 8px;text-transform:uppercase;letter-spacing:.03em}
  .sub{color:var(--muted);font-size:13px;line-height:1.5}
  .crow{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);border-radius:16px;margin-bottom:10px}
  .crow .ic{width:38px;height:38px;border-radius:11px;background:#1c2740;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .crow .tx{flex:1}.crow .tx .t{font-weight:600;font-size:14px}.crow .tx .s{color:var(--muted);font-size:12px;margin-top:2px}
  .crow .ch{color:var(--muted)}
  /* метрики */
  .grp{margin-top:14px}
  .grp .gh{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin:0 2px 8px;text-transform:uppercase;letter-spacing:.03em}
  .grp .gh i{width:9px;height:9px;border-radius:50%}
  .mrow{display:flex;align-items:center;gap:13px;padding:14px;background:var(--card);border-radius:16px;margin-bottom:9px;cursor:pointer}
  .mrow .ic{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;background:#16203a}
  .mrow .mid{flex:1}
  .mrow .nm{font-weight:700;font-size:15px}
  .mrow .vl{font-size:15px;font-weight:700;margin-top:1px}
  .mrow .ds{color:var(--muted);font-size:12px;margin-top:2px}
  .mrow .dot{width:10px;height:10px;border-radius:50%}
  .mrow .ch{color:var(--muted);margin-left:2px}
  /* нижняя навигация */
  .nav{position:absolute;left:0;right:0;bottom:0;display:flex;background:var(--card2);
       border-top:1px solid var(--line);padding:10px 0 14px}
  .nav button{flex:1;background:none;border:none;color:var(--muted);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:4px}
  .nav button.act{color:var(--teal)}
  .nav .gi{font-size:19px}
  /* экран разбора */
  .detail{position:absolute;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:5}
  .detail.show{display:flex}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:5px 12px;border-radius:20px}
  .btn{display:block;width:100%;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:600;margin-top:10px;cursor:pointer}
  .btn-pri{background:var(--ok);color:#04241d}
  .btn-sec{background:#1a2238;color:var(--txt)}
  .kv{display:flex;justify-content:space-between;align-items:baseline}
  .big{font-size:46px;font-weight:800;letter-spacing:-1px}
  .check{display:flex;align-items:flex-start;gap:10px;margin:9px 0;font-size:14px}
  .check .c{color:var(--ok);font-weight:800}
  .hidden{display:none}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <span class="bk">‹</span>
    <span class="av">✈</span>
    <span class="ti">HRV Анализ<small>бот</small></span>
    <span class="mn">⋮</span>
  </div>

  <!-- СВОДКА -->
  <div class="scroll" id="tab-summary">
    <div class="card center">
      <div class="h2">Сегодняшнее состояние</div>
      <div class="score" id="s-score">—<small>/100</small></div>
      <div class="state" id="s-state">—</div>
      <canvas id="radar" width="360" height="320" style="margin-top:6px;max-width:100%"></canvas>
      <div class="legend">
        <span><i style="background:var(--crit)"></i>&lt; 40</span>
        <span><i style="background:var(--watch)"></i>40–59</span>
        <span><i style="background:var(--ok)"></i>60–79</span>
        <span><i style="background:var(--teal)"></i>80–100</span>
      </div>
      <div class="upd" id="s-upd">🕗 —</div>
    </div>
    <div class="card">
      <div class="ttl">Что это значит</div>
      <div class="sub" id="s-mean">—</div>
    </div>
    <div id="s-cards"></div>
  </div>

  <!-- МЕТРИКИ -->
  <div class="scroll hidden" id="tab-metrics"></div>

  <!-- ИСТОРИЯ (заглушка) -->
  <div class="scroll hidden" id="tab-history">
    <div class="card center sub" style="padding:40px 18px">История измерений<br>появится после нескольких сессий.</div>
  </div>

  <!-- РАЗБОР МЕТРИКИ -->
  <div class="detail" id="detail">
    <div class="top">
      <span class="bk" id="d-back">‹</span>
      <span class="ti">Разбор метрики</span>
    </div>
    <div class="scroll" id="d-body"></div>
  </div>

  <div class="nav">
    <button class="act" data-tab="summary"><span class="gi">♥</span>Сводка</button>
    <button data-tab="metrics"><span class="gi">▮▮</span>Метрики</button>
    <button data-tab="history"><span class="gi">🕘</span>История</button>
  </div>
</div>

<script>
const Z = {ok:'#00d4aa',good:'#a8e063',watch:'#ffd93d',low:'#ff8c42',crit:'#ff4757',teal:'#4ecdc4'};
function zoneColor(p){return p<40?Z.crit:p<60?Z.watch:p<80?Z.ok:Z.teal}
const STBADGE={ok:['Хорошо',Z.ok],watch:['Норма',Z.watch],crit:['Внимание',Z.crit]};

// ---- ДЕМО-ДАННЫЕ (из мокапа); реальные подставит loadData() из hrv_data.json ----
const DEMO = {
  score:78, state:"Хорошее состояние", updated:"сегодня, 08:30",
  meaning:"Ваш организм хорошо восстанавливается и справляется с нагрузками. Поддерживайте текущий режим.",
  axes:{"Готовность":78,"Стрессоустойчивость":62,"Адаптивность":75,"Гибкость":84,"Восстановление":80,"Выносливость":83,"Баланс":70},
  cards:[
    {ic:"🛡",t:"Что хорошо",s:"Высокая активность парасимпатической системы и хороший сон.",col:Z.ok},
    {ic:"⚠",t:"На что обратить внимание",s:"Умеренная симпатическая активность и стресс — стоит наблюдать.",col:Z.watch},
    {ic:"ⓘ",t:"Рекомендация",s:"Лёгкая активность и дыхательные практики сегодня будут кстати.",col:'#229ed9'},
  ],
  metrics:[
    {ic:"〜",nm:"RMSSD",val:"76 ms",ds:"Активность восстановления",st:"ok",norm:"50–120 ms",
     explain:"RMSSD отражает активность восстановления и работу парасимпатической системы. Чем выше показатель — тем лучше организм восстанавливается и справляется со стрессом.",
     advice:["Сохраняйте текущий режим сна","Умеренные физические нагрузки","Практики расслабления и дыхание"],
     spark:[60,62,58,64,61,66,63,70,68,72,69,74,71,76]},
    {ic:"〜",nm:"SDNN",val:"58 ms",ds:"Общая вариабельность",st:"ok",norm:"50–100 ms",
     explain:"SDNN — общая вариабельность ритма, маркер адаптационных резервов.",advice:["Поддерживайте режим","Прогулки на воздухе"],spark:[40,45,50,48,55,52,58]},
    {ic:"%",nm:"PNS Index",val:"2.6",ds:"Парасимпатическая активность",st:"ok",norm:"−0.3…+большое",
     explain:"PNS Index (Kubios) — активность парасимпатики, восстановление.",advice:["Хороший показатель восстановления"],spark:[1,1.5,2,2.2,2.4,2.6]},
    {ic:"☺",nm:"Bio-age",val:"31 лет",ds:"Биологический возраст по HRV",st:"ok",norm:"≈ ваш возраст",
     explain:"Функциональный возраст по HRV относительно нормы для вашего возраста.",advice:["Так держать"],spark:[36,35,34,33,32,31]},
    {ic:"%",nm:"pNN50",val:"34 %",ds:"Парасимпатическая активность",st:"watch",norm:"10–20 %",
     explain:"pNN50 — гибкость нервной системы. Высокие значения обычно хорошо, но стоит наблюдать в динамике.",advice:["Наблюдать в динамике"],spark:[20,25,28,30,32,34]},
    {ic:"⚖",nm:"LF/HF",val:"1.8 ratio",ds:"Баланс систем",st:"watch",norm:"0.5–2.0",
     explain:"LF/HF — баланс симпатики и парасимпатики. 1.8 — у верхней границы нормы.",advice:["Дыхательные практики","Снизить стимуляторы вечером"],spark:[1.2,1.4,1.5,1.6,1.7,1.8]},
    {ic:"🔥",nm:"SNS Index",val:"1.4",ds:"Симпатическая активность",st:"watch",norm:"−0.3…+0.3",
     explain:"SNS Index (Kubios) — мобилизация/симпатика. Повышен — есть напряжение.",advice:["Паузы на восстановление"],spark:[0.6,0.8,1.0,1.2,1.3,1.4]},
    {ic:"⚡",nm:"Stress Index",val:"112",ds:"Уровень стресса и напряжения",st:"crit",norm:"50–150",
     explain:"Индекс напряжения Баевского. 112 — повышенный уровень стресса и напряжения регуляторных систем.",advice:["Снизить нагрузку сегодня","Дыхание 4-7-8","Сон не меньше 7–8 ч"],spark:[60,70,85,95,105,112]},
  ]
};

let DATA = DEMO;

// перенос длинных подписей осей на 2 строки (полные слова, не режем)
const AX_DISP = {
  "Стрессоустойчивость":["Стрессо-","устойчивость"],
  "Адаптивность":["Адаптив-","ность"],
  "Восстановление":["Восстанов-","ление"],
  "Выносливость":["Вынос-","ливость"],
};
function drawRadar(axes){
  const cv=document.getElementById('radar'),x=cv.getContext('2d');
  const keys=Object.keys(axes),n=keys.length;
  const cx=cv.width/2,cy=cv.height/2,R=78;
  x.clearRect(0,0,cv.width,cv.height);
  // сетка
  x.strokeStyle='#243049';x.lineWidth=1;
  for(let g=1;g<=4;g++){x.beginPath();for(let i=0;i<=n;i++){const a=-Math.PI/2+i/n*2*Math.PI,rr=R*g/4;const px=cx+rr*Math.cos(a),py=cy+rr*Math.sin(a);i?x.lineTo(px,py):x.moveTo(px,py);}x.stroke();}
  for(let i=0;i<n;i++){const a=-Math.PI/2+i/n*2*Math.PI;x.beginPath();x.moveTo(cx,cy);x.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));x.stroke();}
  // полигон
  x.beginPath();
  keys.forEach((k,i)=>{const a=-Math.PI/2+i/n*2*Math.PI,rr=R*Math.max(0,Math.min(100,axes[k]))/100;const px=cx+rr*Math.cos(a),py=cy+rr*Math.sin(a);i?x.lineTo(px,py):x.moveTo(px,py);});
  x.closePath();
  x.fillStyle='rgba(78,205,196,.28)';x.strokeStyle=Z.teal;x.lineWidth=2;x.fill();x.stroke();
  // подписи осей: полные слова, выравнивание наружу, перенос длинных
  x.fillStyle='#9aa4bd';x.font='11px sans-serif';
  keys.forEach((k,i)=>{
    const a=-Math.PI/2+i/n*2*Math.PI;
    const px=cx+(R+12)*Math.cos(a),py=cy+(R+12)*Math.sin(a);
    const c=Math.cos(a);
    x.textAlign = c>0.3?'left':(c<-0.3?'right':'center');
    const lines = AX_DISP[k] || [k];
    const y0 = py - (lines.length-1)*6 + 4;
    lines.forEach((ln,j)=>x.fillText(ln, px, y0 + j*12));
  });
}
function sparkline(canvas,arr,col){
  const x=canvas.getContext('2d'),w=canvas.width,h=canvas.height,mn=Math.min(...arr),mx=Math.max(...arr)||1;
  x.clearRect(0,0,w,h);x.strokeStyle=col;x.lineWidth=2;x.beginPath();
  arr.forEach((v,i)=>{const px=i/(arr.length-1)*(w-8)+4,py=h-8-(v-mn)/((mx-mn)||1)*(h-20);i?x.lineTo(px,py):x.moveTo(px,py);});
  x.stroke();
  const lx=w-4,ly=h-8-(arr[arr.length-1]-mn)/((mx-mn)||1)*(h-20);
  x.fillStyle=col;x.beginPath();x.arc(lx-2,ly,3.5,0,7);x.fill();
}

function renderSummary(d){
  document.getElementById('s-score').innerHTML=`${d.score}<small>/100</small>`;
  const st=document.getElementById('s-state');st.textContent=d.state;st.style.color=zoneColor(d.score);
  document.getElementById('s-upd').textContent='🕗 Обновлено '+d.updated;
  document.getElementById('s-mean').textContent=d.meaning;
  drawRadar(d.axes);
  document.getElementById('s-cards').innerHTML=d.cards.map(c=>
    `<div class="crow"><div class="ic" style="color:${c.col}">${c.ic}</div>
     <div class="tx"><div class="t">${c.t}</div><div class="s">${c.s}</div></div><div class="ch">›</div></div>`).join('');
}
function renderMetrics(d){
  const groups=[['ok','В норме / хорошо',Z.ok],['watch','Норма / стоит наблюдать',Z.watch],['crit','Требует внимания',Z.crit]];
  let h='';
  for(const [st,title,col] of groups){
    const items=d.metrics.filter(m=>m.st===st);if(!items.length)continue;
    h+=`<div class="grp"><div class="gh"><i style="background:${col}"></i>${title}</div>`;
    items.forEach((m,i)=>{const gi=d.metrics.indexOf(m);
      h+=`<div class="mrow" data-m="${gi}"><div class="ic" style="color:${col}">${m.ic}</div>
          <div class="mid"><div class="nm">${m.nm}</div><div class="vl">${m.val}</div><div class="ds">${m.ds}</div></div>
          <div class="dot" style="background:${col}"></div><div class="ch">›</div></div>`;});
    h+=`</div>`;
  }
  document.getElementById('tab-metrics').innerHTML=h;
  document.querySelectorAll('.mrow').forEach(r=>r.onclick=()=>openDetail(+r.dataset.m));
}
function openDetail(i){
  const m=DATA.metrics[i],[btxt,bcol]=STBADGE[m.st];
  document.getElementById('d-body').innerHTML=`
    <div class="card"><div class="kv"><div class="big" style="color:${bcol}">${m.val.split(' ')[0]}<span class="sub" style="font-size:18px"> ${m.val.split(' ').slice(1).join(' ')}</span></div>
      <span class="pill" style="background:${bcol}22;color:${bcol}">● ${btxt}</span></div></div>
    <div class="card"><div class="ttl">Что это значит</div><div class="sub">${m.explain}</div></div>
    <div class="card"><div class="ttl">Норма для вас</div><div class="big" style="font-size:30px;color:${Z.ok}">${m.norm}</div>
      <div class="sub">Оптимальный диапазон для вашего возраста и пола.</div></div>
    <div class="card"><div class="ttl">Динамика за неделю</div><canvas id="dspark" width="360" height="110"></canvas></div>
    <div class="card"><div class="ttl">Что делать</div>${m.advice.map(a=>`<div class="check"><span class="c">✓</span><span>${a}</span></div>`).join('')}</div>
    <button class="btn btn-pri">Разобрать подробнее ↗</button>
    <button class="btn btn-sec">Получить рекомендацию ✨</button>`;
  document.getElementById('detail').classList.add('show');
  sparkline(document.getElementById('dspark'),m.spark,bcol);
}
document.getElementById('d-back').onclick=()=>document.getElementById('detail').classList.remove('show');

document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('act'));b.classList.add('act');
  ['summary','metrics','history'].forEach(t=>document.getElementById('tab-'+t).classList.add('hidden'));
  document.getElementById('tab-'+b.dataset.tab).classList.remove('hidden');
});

function renderAll(d){DATA=d;renderSummary(d);renderMetrics(d);}
async function loadData(){
  for(const url of ['hrv_data.json','hrv_data.sample.json']){
    try{const r=await fetch(url,{cache:'no-store'});if(r.ok){renderAll(await r.json());return;}}catch(e){}
  }
  renderAll(DEMO);
}
loadData();
</script>
</body>
</html>
