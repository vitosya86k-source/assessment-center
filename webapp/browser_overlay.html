<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Захват вкладки (ПК)</title>
<script>
// На телефоне — режим «накладка с камерой», не захват вкладки (getDisplayMedia на моб. почти не работает).
(function(){
  const m=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
  if(m) location.replace('mobile_overlay.html'+location.search);
})();
</script>
<style>
  :root{--bg:#0f1320;--card:#1a2032;--ink:#eaf0ff;--soft:#8b97b5;--accent:#4fd1c5;--warn:#ffb454;--bad:#ff6b6b}
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI",Roboto,sans-serif}
  .wrap{max-width:640px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:12px}
  h1{font-size:19px;margin:0}
  .sub{color:var(--soft);font-size:13px;line-height:1.45}
  .stage{position:relative;width:100%;background:#000;border-radius:14px;overflow:hidden;aspect-ratio:16/9}
  video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
  #roi{position:absolute;border:2px solid var(--accent);border-radius:8px;cursor:move;box-shadow:0 0 0 9999px rgba(0,0,0,.28);display:none}
  #roi:after{content:"участник";position:absolute;left:0;top:-19px;font-size:11px;color:var(--accent)}
  .hrbox{text-align:center}
  .hr{font-size:60px;font-weight:820;line-height:1}
  .hr small{font-size:17px;color:var(--soft)}
  button{width:100%;border:0;border-radius:14px;padding:14px;font-size:16px;font-weight:700;
    background:linear-gradient(180deg,#4fd1c5,#36b3a8);color:#06211e;cursor:pointer}
  button.secondary{background:#252c41;color:var(--ink)}
  button:disabled{opacity:.45}
  .row{display:flex;gap:10px}
  .hint{font-size:12.5px;color:var(--soft);line-height:1.45;padding:12px;background:var(--card);border-radius:12px}
  .ok{color:var(--accent)} .bad{color:var(--bad)} .warn{color:var(--warn)}
  .bar{height:7px;border-radius:99px;background:#252c41;overflow:hidden;margin-top:9px}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),#8be9d6);transition:.3s}
  label.sz{font-size:12.5px;color:var(--soft);display:flex;align-items:center;gap:8px}
  input[type=range]{flex:1}
  a{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <div>
    <h1>Пульс с вкладки (только ПК)</h1>
    <p class="sub">Для <strong>ноутбука</strong> с Chrome/Edge: захват вкладки Гранатума или окна Zoom.
      На телефоне используй <a href="mobile_overlay.html">накладку с камерой</a> или /analyze в боте.</p>
  </div>
  <div class="stage">
    <video id="scr" playsinline muted autoplay></video>
    <div id="roi"></div>
  </div>
  <div class="hrbox">
    <div class="hr"><span id="hr">—</span><small> уд/мин</small></div>
    <div id="quality" style="font-size:13px;color:var(--soft);margin-top:4px">нажми «Захватить вкладку»</div>
    <div class="bar"><i id="prog"></i></div>
  </div>
  <label class="sz">Размер рамки <input type="range" id="size" min="6" max="40" value="16"></label>
  <div class="row"><button id="grab">Захватить вкладку</button></div>
  <div class="row">
    <button id="rec" class="secondary" disabled>● Запись</button>
    <button id="csv" class="secondary" disabled>⬇ CSV</button>
  </div>
  <p class="hint" id="hint">В диалоге выбери вкладку с участником. Рамку наведи на лицо. Маркер rPPG, не медприбор.</p>
</div>
<canvas id="cv" width="200" height="200" style="display:none"></canvas>
<script>
const video=document.getElementById('scr'), roi=document.getElementById('roi');
const cv=document.getElementById('cv'), ctx=cv.getContext('2d',{willReadFrequently:true});
const hrEl=document.getElementById('hr'), qEl=document.getElementById('quality'), progEl=document.getElementById('prog');
const grabBtn=document.getElementById('grab'), recBtn=document.getElementById('rec'), csvBtn=document.getElementById('csv');
const sizeEl=document.getElementById('size'), hintEl=document.getElementById('hint');
let roiC={x:0.5,y:0.32}, roiW=0.16, buf=[], series=[], running=false, recording=false, lastCalc=0, lastHR=null, lastSNR=0;
const mean=a=>a.reduce((s,x)=>s+x,0)/a.length;
const std=a=>{const m=mean(a);return Math.sqrt(mean(a.map(x=>(x-m)**2)));};
function fitRoi(){
  const st=video.getBoundingClientRect(), vw=video.videoWidth||16, vh=video.videoHeight||9;
  const scale=Math.min(st.width/vw, st.height/vh), dw=vw*scale, dh=vh*scale, ox=(st.width-dw)/2, oy=(st.height-dh)/2;
  const w=roiW*dw, h=roiW*dw*1.15;
  roi.style.left=(ox+roiC.x*dw-w/2)+'px'; roi.style.top=(oy+roiC.y*dh-h/2)+'px';
  roi.style.width=w+'px'; roi.style.height=h+'px';
}
sizeEl.oninput=()=>{roiW=sizeEl.value/100;fitRoi();};
video.addEventListener('click',e=>{
  const st=video.getBoundingClientRect(), vw=video.videoWidth||16, vh=video.videoHeight||9;
  const scale=Math.min(st.width/vw, st.height/vh), dw=vw*scale, dh=vh*scale, ox=(st.width-dw)/2, oy=(st.height-dh)/2;
  roiC.x=Math.min(1,Math.max(0,((e.clientX-st.left)-ox)/dw));
  roiC.y=Math.min(1,Math.max(0,((e.clientY-st.top)-oy)/dh));
  fitRoi();
});
window.addEventListener('resize',fitRoi);
async function grab(){
  try{
    const stream=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:30},audio:false});
    video.srcObject=stream; await video.play();
    stream.getVideoTracks()[0].addEventListener('ended',()=>{running=false;recBtn.disabled=true;});
    roi.style.display='block'; fitRoi(); running=true; recBtn.disabled=false;
    qEl.textContent='вкладка захвачена — рамка на лицо';
    requestAnimationFrame(loop);
  }catch(e){ qEl.innerHTML='<span class="bad">захват отменён</span>'; }
}
function sampleRoi(){
  const vw=video.videoWidth, vh=video.videoHeight; if(!vw) return null;
  const w=Math.max(8,Math.floor(roiW*vw)), h=Math.max(8,Math.floor(roiW*vw*1.15));
  const sx=Math.floor(roiC.x*vw-w/2), sy=Math.floor(roiC.y*vh-h/2);
  cv.width=w; cv.height=h;
  try{ctx.drawImage(video,sx,sy,w,h,0,0,w,h);}catch(e){return null;}
  const d=ctx.getImageData(0,0,w,h).data; let r=0,g=0,b=0,n=0;
  for(let i=0;i<d.length;i+=4){r+=d[i];g+=d[i+1];b+=d[i+2];n++;}
  return n?{r:r/n,g:g/n,b:b/n}:null;
}
function posSignal(R,G,B){
  const mR=mean(R),mG=mean(G),mB=mean(B);
  const Rn=R.map(x=>x/mR-1),Gn=G.map(x=>x/mG-1),Bn=B.map(x=>x/mB-1);
  const S1=Gn.map((g,i)=>g-Bn[i]),S2=Gn.map((g,i)=>g+Bn[i]-2*Rn[i]);
  const a=std(S1)/(std(S2)||1e-9);
  let h=S1.map((s,i)=>s+a*S2[i]); const mh=mean(h); return h.map(x=>x-mh);
}
function dominantHR(sig,fps){
  let best={f:0,p:0},tot=0,k=0;
  for(let f=0.7;f<=3.0;f+=0.008){
    let re=0,im=0;for(let i=0;i<sig.length;i++){const a=2*Math.PI*f*i/fps;re+=sig[i]*Math.cos(a);im-=sig[i]*Math.sin(a);}
    const p=(re*re+im*im)/sig.length; tot+=p; k++; if(p>best.p)best={f,p};
  }
  return {hr:best.f*60,snr:best.p/((tot/k)||1e-9)};
}
function compute(){
  if(buf.length<40) return;
  const w=buf.filter(s=>s.t>=buf[buf.length-1].t-10000); if(w.length<60) return;
  const fps=(w.length-1)/((w[w.length-1].t-w[0].t)/1000); if(fps<8) return;
  const {hr,snr}=dominantHR(posSignal(w.map(s=>s.r),w.map(s=>s.g),w.map(s=>s.b)),fps);
  lastHR=Math.round(hr); lastSNR=snr; hrEl.textContent=lastHR;
  qEl.innerHTML=snr>=2.2?'<span class="ok">сигнал хороший</span>':snr>=1.3?'<span class="warn">средний</span>':'<span class="bad">слабый</span>';
  if(recording&&lastHR){series.push({t_iso:new Date().toISOString(),hr:lastHR,snr:+snr.toFixed(2)});csvBtn.disabled=false;}
}
function loop(){
  if(!running) return;
  const s=sampleRoi(); if(s){s.t=performance.now();buf.push(s);if(buf.length>1200)buf.shift();}
  progEl.style.width=Math.min(100,(buf.length/300*100))+'%';
  if(performance.now()-lastCalc>1000){lastCalc=performance.now();compute();}
  requestAnimationFrame(loop);
}
grabBtn.onclick=grab;
recBtn.onclick=()=>{recording=!recording;recBtn.textContent=recording?'■ Стоп':'● Запись';};
csvBtn.onclick=()=>{
  if(!series.length) return;
  const blob=new Blob(['t_iso,hr_bpm,snr\n'+series.map(r=>`${r.t_iso},${r.hr},${r.snr}`).join('\n')],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='pulse_tab_'+new Date().toISOString().replace(/[:.]/g,'-')+'.csv'; a.click();
};
</script>
</body>
</html>
