<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Live-анализ участника</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{--bg:#0a0e1a;--card:#161d30;--line:#222a40;--txt:#eef2fb;--muted:#8b94ad;
        --ok:#00d4aa;--watch:#ff8c42;--crit:#ff4757;--accent:#4fd1c5}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,"Segoe UI",Roboto,sans-serif}
  .wrap{max-width:560px;margin:0 auto;padding:10px;display:flex;flex-direction:column;gap:9px}
  h1{font-size:17px;margin:0;font-weight:760}
  .src{display:flex;gap:7px}
  .src button{flex:1;border:1px solid var(--line);background:var(--card);color:var(--txt);
    border-radius:10px;padding:9px 4px;font-size:12.5px;font-weight:600;cursor:pointer}
  .src button.on{border-color:var(--accent);color:var(--accent)}
  .stage{position:relative;width:100%;background:#000;border-radius:14px;overflow:hidden}
  #view{width:100%;max-height:42vh;object-fit:contain;display:block;background:#000;touch-action:manipulation}
  .ctrls{position:absolute;right:8px;bottom:8px;display:flex;flex-direction:column;gap:7px}
  .ctrls button{width:42px;height:42px;border-radius:50%;border:0;background:rgba(20,28,46,.82);
    color:#fff;font-size:20px;font-weight:700;backdrop-filter:blur(4px)}
  .hint{position:absolute;left:0;right:0;top:0;background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);
    color:#cfd6e8;font-size:11.5px;padding:8px 10px 16px}
  .status{font-size:12px;color:var(--muted);min-height:16px}
  .status .bad{color:var(--crit)} .status .ok{color:var(--ok)}
  .urlbar{display:none;gap:7px}.urlbar.on{display:flex}
  .urlbar input{flex:1;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:9px;font-size:12.5px}
  .urlbar button{background:var(--accent);color:#06211e;border:0;border-radius:9px;padding:0 13px;font-weight:700}
  .grp{background:var(--card);border-radius:12px;padding:4px 12px;border-left:4px solid var(--line)}
  .grp.sev0{border-left-color:var(--ok)}.grp.sev2{border-left-color:var(--watch)}
  .gt{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:8px 0 4px;font-weight:700}
  .row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}
  .row .nm{font-size:12.5px;color:#cfd6e8}
  .row .val{font-weight:700;font-size:13.5px;font-variant-numeric:tabular-nums;text-align:right}
  .row .val.bad{color:var(--crit)}.row .val.watch{color:var(--watch)}.row .val.ok{color:var(--ok)}
  .note{font-size:11.5px;color:var(--muted);line-height:1.4}
  input[type=file]{display:none}
</style>
</head>
<body>
<div class="wrap">
  <h1>Live-анализ участника</h1>
  <div class="src">
    <button id="bcam" class="on">📷 Камера</button>
    <button id="bfile">📁 Файл</button>
    <button id="burl">🔗 Ссылка</button>
  </div>
  <div class="urlbar" id="urlbar"><input id="urlinp" type="url" placeholder="ссылка на видео (.mp4, с CORS)"><button id="urlgo">→</button></div>

  <div class="stage">
    <canvas id="view"></canvas>
    <div class="hint" id="hint">Наведи на человека/экран · тапни по лицу, кого смотреть</div>
    <div class="ctrls">
      <button id="flip" title="перевернуть камеру">🔄</button>
      <button id="zin" title="приблизить">+</button>
      <button id="zout" title="отдалить">−</button>
    </div>
  </div>
  <div class="status" id="status">загружаю модели…</div>

  <div class="grp" id="g_speech"><div class="gt">💬 Речь</div><div id="speech"></div></div>
  <div class="grp" id="g_emo"><div class="gt">🙂 Эмоции</div><div id="emo"></div></div>
  <div class="grp" id="g_pose"><div class="gt">🧍 Поза</div><div id="pose"></div></div>
  <div class="grp" id="g_pulse"><div class="gt">❤️ Пульс по видео</div><div id="pulse"></div></div>
  <p class="note">Камера/файл — сразу; по ссылке — если видео с CORS. Метрики на телефоне (MediaPipe). Маркеры, не медприбор.</p>
  <div class="row" style="padding:8px 0;gap:8px">
    <button id="recbtn" style="flex:1;border:0;border-radius:10px;padding:10px;background:#252c41;color:#eef2fb;font-weight:700">● Запись CSV</button>
    <button id="csvbtn" style="flex:1;border:0;border-radius:10px;padding:10px;background:#4fd1c5;color:#06211e;font-weight:700" disabled>⬇ Скачать CSV</button>
  </div>

  <input type="file" id="file" accept="video/*">
  <video id="src" playsinline muted style="display:none"></video>
</div>

<script type="module">
import { FaceLandmarker, PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";
const TG = window.Telegram?.WebApp; if(TG){ try{TG.expand();TG.ready();}catch(e){} }

const video=document.getElementById('src'), cv=document.getElementById('view');
const ctx=cv.getContext('2d',{willReadFrequently:true});
const statusEl=document.getElementById('status');
let face=null, pose=null, ready=false, facing='environment', zoom=1, roiTap=null, tainted=false;
let micStream=null, analyser=null, audioBuf=null;

// ---------- метрики-состояния ----------
const rgbBuf=[]; let lastPulse=0, hrVal=null, snrVal=0;
const speechWin=[]; let lastSpeechCalc=0;
let prevNose=null, fidgetEma=0;
let faceTs=0, poseTs=0, frameN=0;
let recording=false, csvSeries=[];
const mean=a=>a.reduce((s,x)=>s+x,0)/a.length;
const std=a=>{const m=mean(a);return Math.sqrt(mean(a.map(x=>(x-m)**2)));};

// ---------- init MediaPipe ----------
async function makeModels(fs, delegate){
  const f=await FaceLandmarker.createFromOptions(fs,{baseOptions:{modelAssetPath:"https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",delegate},runningMode:"VIDEO",numFaces:3,outputFaceBlendshapes:true});
  const p=await PoseLandmarker.createFromOptions(fs,{baseOptions:{modelAssetPath:"https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",delegate},runningMode:"VIDEO",numPoses:1});
  return [f,p];
}
async function initModels(){
  let fs;
  try{ fs=await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"); }
  catch(e){ statusEl.innerHTML='<span class="bad">нет сети для моделей MediaPipe</span>'; return; }
  try{ [face,pose]=await makeModels(fs,"GPU"); ready=true; statusEl.textContent='модели готовы — наведи камеру'; }
  catch(e1){
    try{ [face,pose]=await makeModels(fs,"CPU"); ready=true; statusEl.textContent='модели готовы (CPU) — наведи камеру'; }
    catch(e2){ statusEl.innerHTML='<span class="bad">не загрузились модели: '+(e2.message||e2)+'</span>'; }
  }
}

// ---------- камера / источники ----------
async function startCamera(){
  selSrc('cam'); stopAll();
  try{
    micStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing,width:{ideal:1280}},audio:true});
    video.srcObject=micStream; video.removeAttribute('src'); await video.play(); tainted=false;
    setupAudioFromStream(micStream);
  }catch(e){ statusEl.innerHTML='<span class="bad">нет доступа к камере/микрофону (нужен HTTPS + разрешение)</span>'; }
}
function loadFile(f){ selSrc('file'); stopAll(); tainted=false; video.srcObject=null; video.src=URL.createObjectURL(f); video.loop=true; video.muted=false; video.play(); setupAudioFromElement(); }
function loadUrl(u){ selSrc('url'); stopAll(); tainted=false; video.srcObject=null; video.crossOrigin='anonymous'; video.src=u; video.loop=true; video.muted=false; video.play().catch(()=>{}); setupAudioFromElement(); }
function stopAll(){ if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;} }

// ---------- аудио (речь) ----------
let audioCtx=null;
function ensureAudioCtx(){ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function setupAudioFromStream(stream){
  try{ const ac=ensureAudioCtx(); const s=ac.createMediaStreamSource(stream); analyser=ac.createAnalyser(); analyser.fftSize=2048; s.connect(analyser); audioBuf=new Float32Array(analyser.fftSize); }catch(e){}
}
function setupAudioFromElement(){
  try{ const ac=ensureAudioCtx(); const s=ac.createMediaElementSource(video); analyser=ac.createAnalyser(); analyser.fftSize=2048; s.connect(analyser); analyser.connect(ac.destination); audioBuf=new Float32Array(analyser.fftSize); }catch(e){}
}
function pitchAutocorr(buf,sr){
  let rms=0; for(const v of buf) rms+=v*v; rms=Math.sqrt(rms/buf.length); if(rms<0.01) return 0;
  let best=-1,bestv=0; const minP=Math.floor(sr/350), maxP=Math.floor(sr/70);
  for(let lag=minP; lag<=maxP; lag++){ let s=0; for(let i=0;i<buf.length-lag;i++) s+=buf[i]*buf[i+lag]; if(s>bestv){bestv=s;best=lag;} }
  return best>0? sr/best : 0;
}
function sampleAudio(){
  if(!analyser) return;
  analyser.getFloatTimeDomainData(audioBuf);
  let rms=0; for(const v of audioBuf) rms+=v*v; rms=Math.sqrt(rms/audioBuf.length);
  const db=20*Math.log10(rms+1e-9); const voiced=rms>0.012;
  const p=voiced? pitchAutocorr(audioBuf, (audioCtx?audioCtx.sampleRate:44100)) : 0;
  speechWin.push({t:performance.now(),voiced,db,p});
  while(speechWin.length && speechWin[0].t < performance.now()-20000) speechWin.shift();
}

// ---------- основной цикл ----------
function drawFrame(){
  const vw=video.videoWidth, vh=video.videoHeight; if(!vw) return false;
  cv.width=480; cv.height=Math.round(480*vh/vw);
  const sw=vw/zoom, sh=vh/zoom, sx=(vw-sw)/2, sy=(vh-sh)/2;
  try{ ctx.drawImage(video,sx,sy,sw,sh,0,0,cv.width,cv.height); }catch(e){ return false; }
  return true;
}
function loop(){
  requestAnimationFrame(loop);
  if(!ready || video.readyState<2) return;
  if(!drawFrame()) return;
  const ts=performance.now(); frameN++;
  sampleAudio();
  // лицо: пульс + эмоции (таймштамп строго растёт — иначе MediaPipe ломается)
  let fr=null; try{ faceTs=Math.max(faceTs+1, Math.round(ts)); fr=face.detectForVideo(cv,faceTs); }catch(e){}
  let faceOk=false;
  if(fr && fr.faceLandmarks && fr.faceLandmarks.length){
    // выбор лица: ближайшее к тапу, иначе крупнейшее
    let bi=0;
    if(fr.faceLandmarks.length>1){
      if(roiTap){ let bd=1e9; fr.faceLandmarks.forEach((lm,i)=>{const d=(lm[1].x-roiTap.x)**2+(lm[1].y-roiTap.y)**2; if(d<bd){bd=d;bi=i;}}); }
      else { let ba=0; fr.faceLandmarks.forEach((lm,i)=>{const xs=lm.map(p=>p.x),ys=lm.map(p=>p.y);const a=(Math.max(...xs)-Math.min(...xs))*(Math.max(...ys)-Math.min(...ys)); if(a>ba){ba=a;bi=i;}}); }
    }
    const lm=fr.faceLandmarks[bi]; faceOk=true;
    const idx=[10,67,297,109,338,151]; let xs=idx.map(i=>lm[i].x*cv.width), ys=idx.map(i=>lm[i].y*cv.height);
    const x0=Math.max(0,Math.min(...xs)), x1=Math.min(cv.width,Math.max(...xs));
    const y0=Math.max(0,Math.min(...ys)), y1=Math.min(cv.height,Math.max(...ys));
    if(x1-x0>4 && y1-y0>3){
      try{ const d=ctx.getImageData(x0|0,y0|0,(x1-x0)|0,(y1-y0)|0).data; let r=0,g=0,b=0,n=0;
        for(let i=0;i<d.length;i+=4){r+=d[i];g+=d[i+1];b+=d[i+2];n++;}
        rgbBuf.push({t:ts,r:r/n,g:g/n,b:b/n}); if(rgbBuf.length>600) rgbBuf.shift();
      }catch(e){ tainted=true; }
    }
    ctx.strokeStyle='#4fd1c5'; ctx.lineWidth=2; ctx.strokeRect(x0,y0,Math.max(2,x1-x0),Math.max(2,y1-y0));
    if(fr.faceBlendshapes && fr.faceBlendshapes[bi]) updateEmotion(fr.faceBlendshapes[bi].categories);
  }
  // поза — каждый 3-й кадр (экономим телефон)
  if(frameN%3===0){ let pr=null; try{ poseTs=Math.max(poseTs+1, Math.round(ts)); pr=pose.detectForVideo(cv,poseTs); }catch(e){}
    if(pr && pr.landmarks && pr.landmarks[0]) updatePose(pr.landmarks[0]); }
  if(ts-lastPulse>1000){ lastPulse=ts; computePulse(); }
  if(ts-lastSpeechCalc>900){ lastSpeechCalc=ts; computeSpeech(); }
  if(recording) pushCsvSample();
  // живой статус — видно, что детектится
  if(tainted){ statusEl.innerHTML='<span class="bad">видео по ссылке без CORS — открой «Файлом»</span>'; }
  else {
    const snd=speechWin.slice(-6).some(s=>s.voiced);
    statusEl.innerHTML=`лицо: ${faceOk?'<span class="ok">✓</span>':'<span class="bad">✗ не вижу</span>'} · `+
      `звук: ${snd?'<span class="ok">✓</span>':'<span class="muted">тихо</span>'}`+
      (fr&&fr.faceLandmarks&&fr.faceLandmarks.length>1?` · лиц: ${fr.faceLandmarks.length} (тапни нужное)`:'');
  }
}

// ---------- расчёты ----------
function bs(cats,name){ const c=cats.find(x=>x.categoryName===name); return c?c.score:0; }
function updateEmotion(cats){
  const smile=(bs(cats,'mouthSmileLeft')+bs(cats,'mouthSmileRight'))/2;
  const frown=(bs(cats,'mouthFrownLeft')+bs(cats,'mouthFrownRight'))/2;
  const browDown=(bs(cats,'browDownLeft')+bs(cats,'browDownRight'))/2;
  const eyeWide=(bs(cats,'eyeWideLeft')+bs(cats,'eyeWideRight'))/2;
  const jaw=bs(cats,'jawOpen'), browUp=bs(cats,'browInnerUp');
  const val=Math.max(-1,Math.min(1, smile - frown - browDown*0.5));
  const ar=Math.max(0,Math.min(1,(eyeWide+jaw+browUp)/2));
  let dom='Нейтральность';
  if(smile>0.4) dom='Радость'; else if(browDown>0.4) dom='Напряжение';
  else if(eyeWide>0.4||jaw>0.5) dom='Удивление'; else if(frown>0.3||browUp>0.5) dom='Грусть';
  renderRows('emo',[
    ['Валентность', (val>=0?'+':'')+val.toFixed(2), val<-0.15?'watch':'ok'],
    ['Возбуждение', ar.toFixed(2), ar>0.7?'watch':'ok'],
    ['Доминанта', dom, ''],
  ], val<-0.15?2:0);
}
function updatePose(lm){
  const W=cv.width,H=cv.height; const P=i=>({x:lm[i].x*W,y:lm[i].y*H});
  const nose=P(0),le=P(7),re=P(8),ls=P(11),rs=P(12),lw=P(15),rw=P(16);
  const sw=Math.hypot(rs.x-ls.x,rs.y-ls.y)||1;
  const hand=Math.min(Math.hypot(lw.x-nose.x,lw.y-nose.y),Math.hypot(rw.x-nose.x,rw.y-nose.y))<0.55*sw;
  let tilt=Math.atan2(re.y-le.y,re.x-le.x)*180/Math.PI; if(tilt>90)tilt-=180; else if(tilt<-90)tilt+=180;
  if(prevNose){ const d=Math.hypot(nose.x-prevNose.x,nose.y-prevNose.y)/sw; fidgetEma=0.9*fidgetEma+0.1*d; } prevNose=nose;
  renderRows('pose',[
    ['Рука у лица', hand?'да':'нет', hand?'watch':'ok'],
    ['Наклон головы', (tilt>=0?'+':'')+tilt.toFixed(0)+'°', Math.abs(tilt)>12?'watch':'ok'],
    ['Ёрзанье', fidgetEma.toFixed(3), fidgetEma>0.03?'watch':'ok'],
  ], hand?2:0);
}
function posSig(R,G,B){ const mR=mean(R),mG=mean(G),mB=mean(B);
  const Rn=R.map(x=>x/mR-1),Gn=G.map(x=>x/mG-1),Bn=B.map(x=>x/mB-1);
  const S1=Gn.map((g,i)=>g-Bn[i]),S2=Gn.map((g,i)=>g+Bn[i]-2*Rn[i]);
  const a=std(S1)/(std(S2)||1e-9); let h=S1.map((s,i)=>s+a*S2[i]); const m=mean(h); return h.map(x=>x-m); }
function computePulse(){
  const cut=performance.now()-10000, w=rgbBuf.filter(s=>s.t>=cut); if(w.length<60) return;
  const fps=(w.length-1)/((w[w.length-1].t-w[0].t)/1000); if(fps<6) return;
  const sig=posSig(w.map(s=>s.r),w.map(s=>s.g),w.map(s=>s.b));
  let best={f:0,p:0},tot=0,k=0; for(let f=0.7;f<=3;f+=0.01){let re=0,im=0;for(let i=0;i<sig.length;i++){const a=2*Math.PI*f*i/fps;re+=sig[i]*Math.cos(a);im-=sig[i]*Math.sin(a);}const p=(re*re+im*im)/sig.length;tot+=p;k++;if(p>best.p)best={f,p};}
  hrVal=Math.round(best.f*60); snrVal=best.p/((tot/k)||1e-9);
  renderRows('pulse',[
    ['ЧСС', hrVal+' уд/мин', snrVal<1.3?'bad':'ok'],
    ['Качество (SNR)', snrVal.toFixed(1), snrVal<1.3?'bad':snrVal<2.2?'watch':'ok'],
  ], snrVal<1.3?2:0);
}
function computeSpeech(){
  const w=speechWin; if(w.length<10){ renderRows('speech',[['Сигнал','тихо/нет речи','']],0); return; }
  const n=w.length, voiced=w.filter(s=>s.voiced).length, ratio=voiced/n;
  let onsets=0; for(let i=1;i<n;i++) if(w[i].voiced&&!w[i-1].voiced) onsets++;
  const secs=(w[n-1].t-w[0].t)/1000, tempo=secs>0? Math.round(onsets/(secs/60)) : 0;
  const dbs=w.filter(s=>s.voiced).map(s=>s.db); const ps=w.filter(s=>s.p>0).map(s=>s.p);
  const vol=dbs.length?mean(dbs):-60, loudIqr=dbs.length>3?(pctl(dbs,75)-pctl(dbs,25)):0;
  const pitch=ps.length?mean(ps):0, pstd=ps.length>1?std(ps):0, pausePct=Math.round((1-ratio)*100);
  renderRows('speech',[
    ['Темп', tempo+'/мин', tempo>50?'watch':'ok'],
    ['Доля пауз', pausePct+' %', pausePct>50?'watch':'ok'],
    ['Громкость', vol.toFixed(0)+' дБ', ''],
    ['Вариативность интонации', Math.round(pstd)+' гц', ''],
    ['Питч', Math.round(pitch)+' гц', ''],
  ],0);
}
function pctl(a,p){const s=[...a].sort((x,y)=>x-y);return s[Math.min(s.length-1,Math.floor(p/100*s.length))];}

function pushCsvSample(){
  const w=speechWin; let tempo='';
  if(w.length>=8){ let on=0; for(let i=1;i<w.length;i++) if(w[i].voiced&&!w[i-1].voiced) on++;
    const sec=(w[w.length-1].t-w[0].t)/1000; tempo=sec>0?String(Math.round(on/(sec/60))):''; }
  csvSeries.push({t_iso:new Date().toISOString(), hr_bpm:hrVal??'', snr:snrVal?+snrVal.toFixed(2):'', speech_tempo:tempo});
  document.getElementById('csvbtn').disabled=false;
}

function renderRows(id,rows,sev){
  const el=document.getElementById(id); const g=el.parentElement;
  g.className='grp sev'+(sev||0);
  el.innerHTML=rows.map(([nm,val,cls])=>`<div class="row"><div class="nm">${nm}</div><div class="val ${cls||''}">${val}</div></div>`).join('');
}

// ---------- управление ----------
function selSrc(w){ ['bcam','bfile','burl'].forEach(id=>document.getElementById(id).classList.toggle('on','b'+w===id)); document.getElementById('urlbar').classList.toggle('on',w==='url'); }
document.getElementById('bcam').onclick=startCamera;
document.getElementById('bfile').onclick=()=>{selSrc('file');document.getElementById('file').click();};
document.getElementById('burl').onclick=()=>selSrc('url');
document.getElementById('file').onchange=e=>{ if(e.target.files[0]) loadFile(e.target.files[0]); };
document.getElementById('urlgo').onclick=()=>{ const u=document.getElementById('urlinp').value.trim(); if(u) loadUrl(u); };
document.getElementById('flip').onclick=()=>{ facing=(facing==='environment')?'user':'environment'; if(micStream) startCamera(); };
document.getElementById('zin').onclick=()=>{ zoom=Math.min(4,zoom+0.5); };
document.getElementById('zout').onclick=()=>{ zoom=Math.max(1,zoom-0.5); };
document.getElementById('hint').addEventListener('pointerdown',()=>document.getElementById('hint').style.display='none');
cv.addEventListener('pointerdown',ev=>{ const r=cv.getBoundingClientRect(); roiTap={x:(ev.clientX-r.left)/r.width,y:(ev.clientY-r.top)/r.height}; document.getElementById('hint').style.display='none'; });

document.getElementById('recbtn').onclick=()=>{
  recording=!recording;
  document.getElementById('recbtn').textContent=recording?'■ Стоп запись':'● Запись CSV';
  document.getElementById('recbtn').style.background=recording?'#ff4757':'#252c41';
};
document.getElementById('csvbtn').onclick=()=>{
  if(!csvSeries.length) return;
  const head='t_iso,hr_bpm,snr,speech_tempo\n';
  const rows=csvSeries.map(r=>`${r.t_iso},${r.hr_bpm},${r.snr},${r.speech_tempo}`).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([head+rows],{type:'text/csv'}));
  a.download='ac_analyze_'+new Date().toISOString().replace(/[:.]/g,'-')+'.csv';
  a.click(); URL.revokeObjectURL(a.href);
};

initModels(); loop();
const _p=new URLSearchParams(location.search);
if(_p.get('v')){ loadUrl(_p.get('v')); } else { startCamera(); }
</script>
